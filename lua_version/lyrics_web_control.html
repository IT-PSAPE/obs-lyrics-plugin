<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrics Control Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #2b2b2b;
            color: #ffffff;
            padding: 20px;
            user-select: none;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: #4a90e2;
        }
        
        .section {
            background-color: #3a3a3a;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .section h2 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #cccccc;
        }
        
        select, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: #4a4a4a;
            color: #ffffff;
            border: 1px solid #5a5a5a;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        select:hover, button:hover {
            background-color: #5a5a5a;
        }
        
        button:active {
            background-color: #6a6a6a;
            transform: translateY(1px);
        }
        
        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .button-row button {
            flex: 1;
        }
        
        .status {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .status-item {
            margin: 5px 0;
        }
        
        .status-label {
            color: #888888;
            display: inline-block;
            width: 80px;
        }
        
        .preview {
            margin-top: 10px;
            padding: 10px;
            background-color: #2a2a2a;
            border-radius: 4px;
            font-style: italic;
            color: #cccccc;
            min-height: 50px;
            word-wrap: break-word;
        }
        
        .info {
            text-align: center;
            color: #888888;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .btn-primary {
            background-color: #4a90e2;
        }
        
        .btn-primary:hover {
            background-color: #357abd;
        }
        
        .btn-stop {
            background-color: #e74c3c;
        }
        
        .btn-stop:hover {
            background-color: #c0392b;
        }
        
        #connection-status {
            text-align: center;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .connected {
            background-color: #27ae60;
            color: white;
        }
        
        .disconnected {
            background-color: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lyrics Control Panel</h1>
        
        <div id="connection-status" class="disconnected">
            Not Connected - Add lyrics_web_server.lua to OBS Scripts
        </div>
        
        <div class="section">
            <h2>Source Selection</h2>
            <select id="source-select">
                <option value="">Select a lyrics source...</option>
            </select>
            <button onclick="refreshSources()">🔄 Refresh Sources</button>
        </div>
        
        <div class="section">
            <h2>Song Selection</h2>
            <select id="song-select">
                <option value="">Select a song...</option>
            </select>
        </div>
        
        <div class="section">
            <h2>Playback Controls</h2>
            <div class="button-row">
                <button onclick="sendCommand('prev')">◀ Previous</button>
                <button class="btn-stop" onclick="sendCommand('stop')">■ Stop</button>
                <button onclick="sendCommand('next')">▶ Next</button>
            </div>
        </div>
        
        <div class="section">
            <h2>Current Status</h2>
            <div class="status">
                <div class="status-item">
                    <span class="status-label">Song:</span>
                    <span id="current-song">None</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Lyric:</span>
                    <span id="current-lyric">0/0</span>
                </div>
                <div class="preview" id="lyric-preview">
                    No lyric loaded
                </div>
            </div>
        </div>
        
        <div class="info">
            Open this file in a browser window and position it next to OBS
        </div>
    </div>
    
    <script>
        let ws = null;
        let currentSource = '';
        let reconnectInterval = null;
        
        function connectWebSocket() {
            try {
                ws = new WebSocket('ws://localhost:9999');
                
                ws.onopen = function() {
                    console.log('Connected to OBS Lyrics Server');
                    document.getElementById('connection-status').className = 'connected';
                    document.getElementById('connection-status').textContent = 'Connected to OBS';
                    clearInterval(reconnectInterval);
                    refreshSources();
                };
                
                ws.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                };
                
                ws.onclose = function() {
                    console.log('Disconnected from OBS');
                    document.getElementById('connection-status').className = 'disconnected';
                    document.getElementById('connection-status').textContent = 'Disconnected - Reconnecting...';
                    startReconnect();
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket error:', error);
                };
            } catch (error) {
                console.error('Failed to connect:', error);
                startReconnect();
            }
        }
        
        function startReconnect() {
            if (!reconnectInterval) {
                reconnectInterval = setInterval(() => {
                    connectWebSocket();
                }, 2000);
            }
        }
        
        function handleMessage(data) {
            switch(data.type) {
                case 'sources':
                    updateSources(data.sources);
                    break;
                case 'songs':
                    updateSongs(data.songs);
                    break;
                case 'status':
                    updateStatus(data.status);
                    break;
            }
        }
        
        function sendMessage(message) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(message));
            }
        }
        
        function refreshSources() {
            sendMessage({ action: 'get_sources' });
        }
        
        function updateSources(sources) {
            const select = document.getElementById('source-select');
            select.innerHTML = '<option value="">Select a lyrics source...</option>';
            sources.forEach(source => {
                const option = document.createElement('option');
                option.value = source;
                option.textContent = source;
                select.appendChild(option);
            });
            
            if (currentSource && sources.includes(currentSource)) {
                select.value = currentSource;
            }
        }
        
        function updateSongs(songs) {
            const select = document.getElementById('song-select');
            select.innerHTML = '<option value="">Select a song...</option>';
            songs.forEach(song => {
                const option = document.createElement('option');
                option.value = song.path;
                option.textContent = song.name;
                select.appendChild(option);
            });
        }
        
        function updateStatus(status) {
            document.getElementById('current-song').textContent = status.song_name || 'None';
            document.getElementById('current-lyric').textContent = `${status.current_line}/${status.total_lines}`;
            
            const preview = status.current_lyric || 'No lyric displayed';
            document.getElementById('lyric-preview').textContent = preview;
        }
        
        function sendCommand(command) {
            if (!currentSource) {
                alert('Please select a lyrics source first');
                return;
            }
            
            sendMessage({
                action: 'control',
                source: currentSource,
                command: command
            });
        }
        
        // Event listeners
        document.getElementById('source-select').addEventListener('change', function(e) {
            currentSource = e.target.value;
            if (currentSource) {
                sendMessage({
                    action: 'select_source',
                    source: currentSource
                });
            }
        });
        
        document.getElementById('song-select').addEventListener('change', function(e) {
            if (currentSource && e.target.value) {
                sendMessage({
                    action: 'change_song',
                    source: currentSource,
                    song: e.target.value
                });
            }
        });
        
        // Start connection
        connectWebSocket();
        
        // Update status periodically
        setInterval(() => {
            if (currentSource) {
                sendMessage({
                    action: 'get_status',
                    source: currentSource
                });
            }
        }, 500);
    </script>
</body>
</html>
