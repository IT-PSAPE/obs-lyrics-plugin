name: Build Windows plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    env:
      CMAKE_GENERATOR: "Visual Studio 17 2022"
      CMAKE_VS_PLATFORM_NAME: "x64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore/cache obs-deps
        uses: actions/cache@v4
        with:
          path: .deps
          key: ${{ runner.os }}-obs-deps-${{ hashFiles('buildspec.json') }}-v1

      - name: Configure with CMake (this will download obs-deps if missing)
        shell: powershell
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        shell: powershell
        run: |
          cmake --build build --config Release --parallel

      - name: Upload Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-plugin-release
          path: |
            build/rundir/Release/**
