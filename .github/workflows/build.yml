name: Build Plugin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libobs-dev qt6-base-dev libqt6svg6-dev

      - name: Configure
        run: cmake --preset ubuntu-ci-x86_64

      - name: Build
        run: cmake --build --preset ubuntu-ci-x86_64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-plugin
          path: build_x86_64/obs-lyrics-plugin.so

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install obs-studio qt@6
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6)" >> $GITHUB_ENV

      - name: Configure
        run: cmake --preset macos-ci
        env:
          CMAKE_PREFIX_PATH: ${{ env.CMAKE_PREFIX_PATH }}:/Applications/OBS.app/Contents/Resources/cmake

      - name: Build
        run: cmake --build --preset macos-ci

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-plugin
          path: build_macos/obs-lyrics-plugin.plugin

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          # OBS and Qt setup on Windows can be tricky in CI without pre-built deps.
          # We will use a common action or manual setup if possible.
          # For simplicity, we assume standard runners or use a helper if available.
          # Actually, OBS provides a helper action or we can download deps.
          # But for this template, we'll try to use the preset which might expect deps.
          # The template preset doesn't define where deps are.
          # Let's skip Windows for now or use a basic setup if we can't guarantee deps.
          echo "Windows build requires setting up OBS and Qt dependencies manually or via cache."
          
      # For now, we will leave Windows out as it requires more complex setup (downloading libobs/qt binaries)
      # than just apt-get or brew. 


